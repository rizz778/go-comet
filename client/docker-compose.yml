version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trade-audit-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - sqlite_data:/app/data
      - watcher_inbox:/app/inbox
      - watcher_processed:/app/processed
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: trade-audit-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local
  watcher_inbox:
    driver: local
  watcher_processed:
    driver: local
